services:
  db:
    image: postgres:16-alpine
    container_name: jokebot-db
    environment:
      - POSTGRES_DB=jokebot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: jokebot-backend
    environment:
      - DEBUG=true
      - HOST=0.0.0.0
      - PORT=8000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=jokebot
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: jokebot-frontend
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: jokebot-client
    ports:
      - "42019:80"
    depends_on:
      - backend
    restart: unless-stopped
