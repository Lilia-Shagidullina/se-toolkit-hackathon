<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Jokes - Joke Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2d3436;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 14px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .navbar-brand { color: #f5576c !important; font-size: 1.5rem; font-weight: 800; text-decoration: none; }
        .navbar-subtitle { color: #636e72; font-size: 0.85rem; }
        .main-wrapper { max-width: 900px; margin: 0 auto; padding: 40px 16px; }
        .pending-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .pending-card h2 { color: #2d3436; font-weight: 700; margin-bottom: 8px; }
        .pending-count { color: #636e72; margin-bottom: 24px; }
        .joke-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .joke-item .joke-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 10px; }
        .joke-item .joke-category {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .joke-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-approve {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #00b894;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-approve:hover { background: #00a381; }
        .btn-reject {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #d63031;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-reject:hover { background: #c0392b; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #636e72;
        }
        .btn-back-home {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .site-footer { text-align: center; padding: 20px 0 32px; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div style="max-width:900px; margin:0 auto; width:100%;">
                <div>
                    <a href="/" class="navbar-brand">Joke Bot</a>
                    <div class="navbar-subtitle">Pending jokes review</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="pending-card">
            <h2>Pending Jokes</h2>
            <p class="pending-count" id="pending-count">Loading...</p>
            <div id="pending-list"></div>
            <a href="/" class="btn-back-home">Back to Jokes</a>
        </div>
    </div>

    <div class="site-footer">Joke Bot — Review and approve submitted jokes</div>

    <script>
        const API_URL = '/api';

        async function loadPendingJokes() {
            const res = await fetch(`${API_URL}/pending_jokes`);
            const data = await res.json();
            const listEl = document.getElementById('pending-list');
            const countEl = document.getElementById('pending-count');

            if (data.count === 0) {
                countEl.textContent = 'No pending jokes';
                listEl.innerHTML = '<div class="empty-state">No jokes waiting for review</div>';
                return;
            }

            countEl.textContent = `${data.count} joke${data.count !== 1 ? 's' : ''} waiting for review`;

            listEl.innerHTML = data.pending.map(joke => `
                <div class="joke-item" id="joke-${joke.id}">
                    <div class="joke-text">${joke.text.replace(/\n/g, '<br>')}</div>
                    <span class="joke-category">${joke.category}</span>
                    <div class="joke-actions">
                        <button class="btn-approve" onclick="approveJoke(${joke.id})">✓ Approve</button>
                        <button class="btn-reject" onclick="rejectJoke(${joke.id})">✗ Reject</button>
                    </div>
                </div>
            `).join('');
        }

        async function approveJoke(jokeId) {
            const res = await fetch(`${API_URL}/approve_joke/${jokeId}`, { method: 'POST' });
            if (res.ok) {
                document.getElementById(`joke-${jokeId}`).remove();
                loadPendingJokes();
            }
        }

        async function rejectJoke(jokeId) {
            const res = await fetch(`${API_URL}/reject_joke/${jokeId}`, { method: 'POST' });
            if (res.ok) {
                document.getElementById(`joke-${jokeId}`).remove();
                loadPendingJokes();
            }
        }

        document.addEventListener('DOMContentLoaded', loadPendingJokes);
    </script>
</body>
</html>
