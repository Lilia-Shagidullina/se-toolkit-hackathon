<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2d3436;
        }

        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 14px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            color: #f5576c !important;
            font-size: 1.5rem;
            font-weight: 800;
        }
        .navbar-subtitle {
            color: #636e72;
            font-size: 0.85rem;
        }

        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 16px;
        }

        .mood-panel {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .mood-panel h5 {
            color: #2d3436;
            margin-bottom: 22px;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .mood-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }
        .mood-btn:last-child {
            margin-bottom: 0;
        }
        .mood-btn:hover {
            filter: brightness(1.1);
        }
        .mood-btn.mood-happy {
            background: linear-gradient(135deg, #f9ca24 0%, #f0932b 100%);
        }
        .mood-btn.mood-sad {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
        }
        .mood-btn.mood-scary {
            background: linear-gradient(135deg, #6c5ce7 0%, #a55eea 100%);
        }
        .mood-btn.mood-angry {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }
        .mood-btn.mood-mysterious {
            background: linear-gradient(135deg, #e056fd 0%, #8854d0 100%);
        }
        .mood-btn.mood-fastidious {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        }
        .mood-btn.mood-disgusting {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
        }
        .mood-btn.mood-bored {
            background: linear-gradient(135deg, #636e72 0%, #2d3436 100%);
        }

        .joke-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .joke-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
        }
        .joke-badge {
            font-size: 0.95rem;
            padding: 6px 14px;
            border-radius: 20px;
            color: #fff;
            font-weight: 600;
        }
        .back-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 8px;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .joke-body {
            padding: 32px 28px;
        }
        .joke-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #2d3436;
            margin-bottom: 28px;
            white-space: pre-line;
        }

        .rating-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
        }
        .rating-info {
            color: #2d3436;
            font-weight: 600;
        }
        .rating-info .score {
            color: #f39c12;
            font-weight: 700;
        }
        .rating-actions {
            display: flex;
            gap: 12px;
        }
        .btn-rate {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #2d3436;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-rate.like:hover {
            background: #00b894;
            color: #fff;
        }
        .btn-rate.dislike:hover {
            background: #d63031;
            color: #fff;
        }
        .btn-refresh {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #2d3436;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-refresh:hover {
            background: #0984e3;
            color: #fff;
        }
        .btn-share {
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #2d3436;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-share:hover {
            background: #6c5ce7;
            color: #fff;
        }

        .feedback-area {
            margin: 0 28px 20px;
            padding: 14px 18px;
            border-radius: 10px;
            display: none;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .feedback-area.success {
            background: #00b894;
            color: #fff;
            display: block;
        }
        .feedback-area.error {
            background: #d63031;
            color: #fff;
            display: block;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.show {
            display: flex;
        }
        .loading-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 36px 44px;
            text-align: center;
            color: #fff;
        }
        .loading-box .icon {
            font-size: 2.8rem;
            margin-bottom: 14px;
        }
        .loading-box p {
            margin: 0;
            font-weight: 500;
        }

        .site-footer {
            text-align: center;
            padding: 20px 0 32px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="container">
            <div style="max-width:900px; margin:0 auto; width:100%; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div class="navbar-brand">Joke Bot</div>
                    <div class="navbar-subtitle">Choose a mood, then get a joke</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <a href="/submit" style="background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 8px 18px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.9rem;">Submit a Joke</a>
                </div>
            </div>
        </div>
    </div>

    <div class="main-wrapper">

        <div id="screen-categories">
            <div class="mood-panel">
                <h5>Choose your mood</h5>
                <div id="categories-grid"></div>
            </div>
        </div>

        <div id="screen-joke" style="display:none;">
            <div class="joke-card">
                <div class="joke-header">
                    <span id="joke-category-badge" class="joke-badge"></span>
                    <a id="btn-back" class="back-link">All moods</a>
                </div>
                <div class="joke-body">
                    <p id="joke-text" class="joke-text"></p>
                </div>
                <div class="rating-bar">
                    <div class="rating-info">
                        <span class="score" id="joke-rating">⭐ 0</span>
                        <span id="joke-votes" style="margin-left:8px;">(0 votes)</span>
                    </div>
                    <div class="rating-actions">
                        <button id="btn-refresh" class="btn-refresh" title="Get new joke">🔄</button>
                        <button id="btn-like" class="btn-rate like" title="Like">👍</button>
                        <button id="btn-dislike" class="btn-rate dislike" title="Dislike">👎</button>
                        <button id="btn-share" class="btn-share" title="Share joke">🔗</button>
                    </div>
                </div>
                <div id="feedback" class="feedback-area"></div>
            </div>
        </div>

    </div>

    <div id="loading" class="loading-overlay">
        <div class="loading-box">
            <div class="icon">⏳</div>
            <p>Loading a joke...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        let currentJoke = null;
        let currentCategory = null;
        const ratedJokes = new Set();

        const screenCategories = document.getElementById('screen-categories');
        const screenJoke = document.getElementById('screen-joke');
        const categoriesGrid = document.getElementById('categories-grid');
        const jokeText = document.getElementById('joke-text');
        const jokeCategoryBadge = document.getElementById('joke-category-badge');
        const jokeRating = document.getElementById('joke-rating');
        const jokeVotes = document.getElementById('joke-votes');
        const feedback = document.getElementById('feedback');
        const btnBack = document.getElementById('btn-back');
        const btnLike = document.getElementById('btn-like');
        const btnDislike = document.getElementById('btn-dislike');
        const btnRefresh = document.getElementById('btn-refresh');
        const btnShare = document.getElementById('btn-share');
        const loading = document.getElementById('loading');

        const MOOD_CLASSES = {
            'Happy': 'mood-happy',
            'Sad': 'mood-sad',
            'Scary': 'mood-scary',
            'Angry': 'mood-angry',
            'Mysterious': 'mood-mysterious',
            'Fastidious': 'mood-fastidious',
            'Disgusting': 'mood-disgusting',
            'Bored': 'mood-bored'
        };

        const CATEGORY_COLORS = {
            'Happy': '#f0932b',
            'Sad': '#0984e3',
            'Scary': '#6c5ce7',
            'Angry': '#ee5a24',
            'Mysterious': '#8854d0',
            'Fastidious': '#00b894',
            'Disgusting': '#e17055',
            'Bored': '#636e72'
        };

        async function getCategories() {
            const res = await fetch(`${API_URL}/categories`);
            if (!res.ok) throw new Error('Failed to load categories');
            return await res.json();
        }

        async function getJoke(category, excludeIndex = -1) {
            const body = { category: category };
            if (excludeIndex >= 0) body.exclude_index = excludeIndex;
            const res = await fetch(`${API_URL}/joke`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Failed to load joke');
            }
            return await res.json();
        }

        async function getJokeById(jokeId) {
            const res = await fetch(`${API_URL}/joke/${jokeId}`);
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Failed to load joke');
            }
            return await res.json();
        }

        async function rateJoke(jokeId, isLike) {
            const res = await fetch(`${API_URL}/rate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ joke_id: jokeId, like: isLike })
            });
            if (!res.ok) throw new Error('Failed to rate joke');
            return await res.json();
        }

        function updateUrlWithJokeId(jokeId) {
            const url = new URL(window.location);
            if (jokeId) {
                url.searchParams.set('joke_id', jokeId);
            } else {
                url.searchParams.delete('joke_id');
            }
            window.history.replaceState({}, '', url);
        }

        function showLoading() { loading.classList.add('show'); }
        function hideLoading() { loading.classList.remove('show'); }

        function showFeedback(msg, type) {
            feedback.textContent = msg;
            feedback.className = 'feedback-area ' + type;
        }
        function hideFeedback() { feedback.className = 'feedback-area'; }

        function updateRatingDisplay(rating, votes) {
            jokeRating.textContent = `⭐ ${rating}`;
            jokeVotes.textContent = votes > 0 ? `(${votes} votes)` : '(0 votes)';
        }

        function showCategories() {
            currentJoke = null;
            currentCategory = null;
            hideFeedback();
            screenJoke.style.display = 'none';
            screenCategories.style.display = 'block';
            updateUrlWithJokeId(null);
        }

        async function loadJoke(category) {
            currentCategory = category;
            showLoading();
            hideFeedback();
            try {
                currentJoke = await getJoke(category);

                jokeText.textContent = currentJoke.text;
                jokeCategoryBadge.textContent = currentJoke.category;
                const color = CATEGORY_COLORS[currentJoke.category] || '#667eea';
                jokeCategoryBadge.style.backgroundColor = color;

                updateRatingDisplay(currentJoke.rating, currentJoke.votes);

                const alreadyRated = ratedJokes.has(currentJoke.id);
                btnLike.disabled = alreadyRated;
                btnDislike.disabled = alreadyRated;

                updateUrlWithJokeId(currentJoke.id);

                screenCategories.style.display = 'none';
                screenJoke.style.display = 'block';
            } catch (err) {
                showFeedback(`❌ ${err.message}`, 'error');
            } finally {
                hideLoading();
            }
        }

        async function refreshJoke() {
            if (!currentCategory) return;
            showLoading();
            hideFeedback();
            try {
                const excludeIdx = currentJoke ? currentJoke.index : -1;
                currentJoke = await getJoke(currentCategory, excludeIdx);

                jokeText.textContent = currentJoke.text;
                jokeCategoryBadge.textContent = currentJoke.category;
                const color = CATEGORY_COLORS[currentJoke.category] || '#667eea';
                jokeCategoryBadge.style.backgroundColor = color;

                updateRatingDisplay(currentJoke.rating, currentJoke.votes);

                const alreadyRated = ratedJokes.has(currentJoke.id);
                btnLike.disabled = alreadyRated;
                btnDislike.disabled = alreadyRated;

                updateUrlWithJokeId(currentJoke.id);
            } catch (err) {
                showFeedback(`❌ ${err.message}`, 'error');
            } finally {
                hideLoading();
            }
        }

        async function handleRate(isLike) {
            if (!currentJoke) return;
            if (ratedJokes.has(currentJoke.id)) return;

            ratedJokes.add(currentJoke.id);
            btnLike.disabled = true;
            btnDislike.disabled = true;

            try {
                const result = await rateJoke(currentJoke.id, isLike);
                updateRatingDisplay(result.rating, result.votes);
            } catch (err) {
                showFeedback(`❌ ${err.message}`, 'error');
                ratedJokes.delete(currentJoke.id);
                btnLike.disabled = false;
                btnDislike.disabled = false;
            }
        }

        async function shareJoke() {
            if (!currentJoke) return;
            const url = new URL(window.location);
            url.searchParams.set('joke_id', currentJoke.id);
            const shareUrl = url.toString();

            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(shareUrl);
                } catch (err) {
                    fallbackCopyToClipboard(shareUrl);
                }
            } else {
                fallbackCopyToClipboard(shareUrl);
            }
        }

        function fallbackCopyToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
            } catch (err) {}
            finally {
                document.body.removeChild(textArea);
            }
        }

        async function init() {
            try {
                const categories = await getCategories();
                const keys = Object.keys(categories);

                keys.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'mood-btn ' + (MOOD_CLASSES[cat] || '');
                    btn.textContent = cat;
                    btn.addEventListener('click', () => loadJoke(cat));
                    categoriesGrid.appendChild(btn);
                });
            } catch (err) {
                console.warn('Failed to load categories via API', err);
            }
        }

        btnBack.addEventListener('click', () => { showCategories(); });
        btnLike.addEventListener('click', () => handleRate(true));
        btnDislike.addEventListener('click', () => handleRate(false));
        btnRefresh.addEventListener('click', () => refreshJoke());
        btnShare.addEventListener('click', () => shareJoke());

        document.addEventListener('DOMContentLoaded', async () => {
            await init();

            const urlParams = new URLSearchParams(window.location.search);
            const jokeId = urlParams.get('joke_id');
            if (jokeId) {
                try {
                    const joke = await getJokeById(parseInt(jokeId));
                    currentJoke = joke;
                    currentCategory = joke.category;

                    jokeText.textContent = joke.text;
                    jokeCategoryBadge.textContent = joke.category;
                    const color = CATEGORY_COLORS[joke.category] || '#667eea';
                    jokeCategoryBadge.style.backgroundColor = color;

                    updateRatingDisplay(joke.rating, joke.votes);

                    const alreadyRated = ratedJokes.has(joke.id);
                    btnLike.disabled = alreadyRated;
                    btnDislike.disabled = alreadyRated;

                    screenCategories.style.display = 'none';
                    screenJoke.style.display = 'block';
                } catch (err) {
                    console.warn('Failed to load joke from URL:', err);
                }
            }
        });
    </script>
</body>
</html>
